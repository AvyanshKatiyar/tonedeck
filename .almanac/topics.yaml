topics:
  - slug: stack
    title: Stack
    description: Technologies and services ToneDeck depends on — CamillaDSP binary, BlackHole virtual audio, Fastify, React, Vite, Commander.js, Zod, the yaml npm package, and vitest.

  - slug: systems
    title: Systems
    description: Custom subsystems built in this repo — Lifecycle, PresetStore, CdspClient, SafetyRails, CamillaYaml emitter, Vibes engine, MeterBroadcaster, EqGen, AutoDJ, and corpus build.

  - slug: corpus
    title: Corpus
    description: Bulk per-track EQ generation pipeline — song catalog ingest, EqGen (Claude CLI generation), resumable corpus build orchestration, and tone-only EQ clustering over the resulting presets.

  - slug: flows
    title: Flows
    description: Multi-file processes end-to-end — the full audio chain from Mac output to headphones, preset apply, engage/disengage, and install.

  - slug: decisions
    title: Decisions
    description: Architecture and design choices — what was chosen and why, including the FIFO CdspClient queue, mutex serialization policy, hot-swap devices block, and the AbandonProcessGroup LaunchAgent flag.

  - slug: concepts
    title: Concepts
    description: Shared vocabulary specific to ToneDeck — Preset, Profile, Band, Vibe, hot-swap, bypass, provenance, and preset versioning.

  - slug: audio
    title: Audio
    description: Audio domain knowledge — RBJ biquad EQ math, the BlackHole loopback trap, CoreAudio device routing, and CamillaDSP config format.

  - slug: daemon
    title: Daemon
    description: The Fastify HTTP+WebSocket daemon in packages/daemon — routes, dependency injection, WebSocket meters, AutoDJ wiring, and SIGTERM behavior.

  - slug: cli
    title: CLI
    description: The Commander.js CLI in packages/cli — all commands, the ApiCtx injection model, and the doctor diagnostic command.

  - slug: ui
    title: UI
    description: The React 19 / Vite 6 single-page app in packages/ui — store shape, phases, the draft/base model, and meter WebSocket feed.

  - slug: safety
    title: Safety
    description: Gain clamping, headroom prediction, clip prevention, and the reject/warn/ok verdict pipeline in packages/shared/src/safety.ts.

  - slug: install
    title: Install
    description: macOS LaunchAgent setup, Homebrew bin symlinks, and Claude Code skill registration performed by scripts/install.sh.

  - slug: incidents
    title: Incidents
    description: Recorded production failures on the live install and their fixes — what broke, the observed signature, root cause, and remediation.
